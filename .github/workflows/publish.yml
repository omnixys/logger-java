name: Release & Publish (Gradle)

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:

  # =========================
  # RELEASE (semantic-release)
  # =========================
  release:
    runs-on: ubuntu-latest

    outputs:
      released: ${{ steps.semantic.outputs.released }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 🔥 REQUIRED for tags + history

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install semantic-release
        run: |
          npm install -g semantic-release \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/github \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/exec \
            conventional-changelog-conventionalcommits

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release | tee log.txt

          if grep -q "Published release" log.txt; then
            echo "released=true" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi


  # =========================
  # PUBLISH (Gradle)
  # =========================
  publish:
    runs-on: ubuntu-latest
    needs: release

    if: needs.release.outputs.released == 'true'

    steps:
      # 🔥 IMPORTANT: full checkout with tags + latest commit
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🔥 ensure we are on latest main INCLUDING release commit
      - name: Ensure latest main
        run: |
          git fetch origin main
          git checkout origin/main

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      # 🔥 SINGLE SOURCE OF TRUTH = gradle.properties
      - name: Extract version from gradle.properties
        run: |
          VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "📦 Publishing version: $VERSION"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      # 🔐 Publish to GitHub Packages / Maven
      - name: Publish
        run: ./gradlew publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}